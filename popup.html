<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Workflow Recorder</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">

      <!-- ── Header ─────────────────────────────────────────────────────── -->
      <header class="header">
        <div class="header-brand">
          <div class="logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
              <circle cx="12" cy="12" r="5" fill="#ef4444"/>
            </svg>
          </div>
          <span class="brand-name">Workflow Recorder</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="settingsBtn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>
          </button>
          <button class="icon-btn" id="menuBtn" title="More options">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5"  r="1.5"/>
              <circle cx="12" cy="12" r="1.5"/>
              <circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- ── Status bar ──────────────────────────────────────────────────── -->
      <div class="status-bar">
        <div class="status-pill" id="statusPill">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-label" id="statusLabel">Ready to record</span>
        </div>
        <div class="version-chip">v1.0.0</div>
      </div>

      <div class="divider"></div>

      <!-- ── Form ───────────────────────────────────────────────────────── -->
      <div class="form-section">
        <label class="field-label" for="recordingName">Recording name</label>
        <div class="input-group">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
          </svg>
          <input
            type="text"
            id="recordingName"
            class="text-input"
            placeholder="Untitled workflow"
            maxlength="100"
          />
        </div>

        <label class="field-label" for="recordingDescription">
          Description <span class="optional">(optional)</span>
        </label>
        <div class="textarea-group">
          <svg class="input-icon textarea-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 12.76c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.076-4.076a1.526 1.526 0 0 1 1.037-.443 48.282 48.282 0 0 0 5.68-.494c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z"/>
          </svg>
          <textarea
            id="recordingDescription"
            class="textarea-input"
            placeholder="Describe what this workflow does..."
            rows="3"
          ></textarea>
        </div>
      </div>

      <!-- ── Info card ───────────────────────────────────────────────────── -->
      <div class="info-card">
        <!-- Row 1: Current tab -->
        <div class="info-row">
          <div class="info-icon-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-meta-label">Current tab</div>
            <div class="info-value" id="currentTabDisplay">Loading…</div>
          </div>
          <div class="active-badge">
            <span class="badge-dot"></span>Active
          </div>
        </div>

        <div class="info-divider"></div>

        <!-- Row 2: Events captured -->
        <div class="info-row">
          <div class="info-icon-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.042 21.672 13.684 16.6m0 0-2.51 2.225.569-9.47 5.227 7.917-3.286-.672Zm-7.518-.267A8.25 8.25 0 1 1 20.25 10.5M8.288 14.212A5.25 5.25 0 1 1 17.25 10.5"/>
            </svg>
          </div>
          <div class="info-content">
            <div class="info-meta-label">Events captured</div>
            <div class="info-value" id="eventCount">0</div>
          </div>
          <button class="view-live-btn" id="viewLiveBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22m0 0-5.94-2.281m5.94 2.28-2.28 5.941"/>
            </svg>
            View live
          </button>
        </div>
      </div>

      <!-- ── Controls ────────────────────────────────────────────────────── -->
      <div class="controls">
        <button class="btn-record" id="startBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
          </svg>
          <span id="startBtnLabel">Start Recording</span>
        </button>

        <div class="btn-row">
          <button class="btn-secondary btn-pause" id="pauseBtn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6"  y="4" width="4" height="16" rx="1"/>
              <rect x="14" y="4" width="4" height="16" rx="1"/>
            </svg>
            <span id="pauseBtnLabel">Pause</span>
          </button>
          <button class="btn-stop" id="stopBtn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
            </svg>
            Stop &amp; Save
          </button>
        </div>
      </div>

      <!-- ── Recent recordings ───────────────────────────────────────────── -->
      <div class="section-header">
        <span class="section-title">Recent recordings</span>
        <button class="text-link" id="viewAllBtn">View all</button>
      </div>

      <div class="recordings-list" id="recordingsList">
        <div class="empty-state" id="emptyState">
          <p>No recordings yet. Start your first recording above.</p>
        </div>
      </div>

      <!-- ── Footer ─────────────────────────────────────────────────────── -->
      <footer class="footer">
        <div class="footer-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z"/>
          </svg>
          <span>All recordings are saved to your dashboard</span>
        </div>
        <button class="footer-link" id="openDashboardBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
          </svg>
          Open Dashboard
        </button>
      </footer>
    </div>

    <!-- ── Live-view modal ─────────────────────────────────────────────── -->
    <div class="modal-overlay hidden" id="liveModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Live workflow steps</span>
          <button class="icon-btn" id="closeLiveModal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="liveStepsList"></div>
      </div>
    </div>

    <!-- ── Recording-item context menu ────────────────────────────────── -->
    <div class="context-menu hidden" id="contextMenu">
      <button class="context-item" id="ctxDownload">Download JSON</button>
      <button class="context-item context-item--danger" id="ctxDelete">Delete</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
